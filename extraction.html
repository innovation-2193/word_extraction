<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โปรแกรมสกัดข้อความดิบ (แก้ไขปัญหาข้อความซ้ำ)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, sans-serif;
        background-color: #f0f2f5;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 950px;
        margin: 0 auto;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin-top: 0;
        color: #d93025;
      }
      .description {
        color: #555;
        margin-bottom: 20px;
        line-height: 1.6;
      }

      .btn {
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background 0.3s;
      }
      .btn-upload {
        background-color: #1a73e8;
        color: white;
      }
      .btn-upload:hover {
        background-color: #1557b0;
      }
      .btn-copy {
        background-color: #34a853;
        color: white;
      }
      .btn-copy:hover {
        background-color: #2b803f;
      }
      .btn-download {
        background-color: #fbbc05;
        color: #333;
      }
      .btn-download:hover {
        background-color: #e0a800;
      }

      #fileName {
        margin-left: 15px;
        font-style: italic;
        color: #666;
        font-weight: bold;
      }
      textarea {
        width: 100%;
        height: 500px;
        margin-top: 20px;
        margin-bottom: 20px;
        padding: 15px;
        box-sizing: border-box;
        border: 2px solid #ccc;
        border-radius: 5px;
        font-family: "Courier New", Courier, monospace;
        font-size: 15px;
        resize: vertical;
        line-height: 1.6;
      }
      .action-buttons {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>
        📄 เครื่องมือดึงข้อความดิบ (แก้ไขปัญหาข้อความ Header/Footer เบิ้ลซ้ำ)
      </h2>
      <p class="description">
        รองรับไฟล์ <b>.docx</b> จัดเรียง <b>[ส่วนหัว] บนสุด</b>,
        <b>[เนื้อหาหลัก] ตรงกลาง</b>, <b>[ส่วนท้าย] ล่างสุด</b><br />
        <i
          >* มีระบบกรองข้อความซ้ำ หากพบ Header/Footer ที่เหมือนกันในหลาย Section
          จะดึงมาแสดงเพียงชุดเดียว</i
        >
      </p>

      <!-- ปุ่มอัปโหลดไฟล์ -->
      <input type="file" id="uploadFile" accept=".docx" style="display: none" />
      <button
        class="btn btn-upload"
        onclick="document.getElementById('uploadFile').click()"
      >
        📂 1. อัปโหลดไฟล์ Word (.docx)
      </button>
      <span id="fileName">ยังไม่ได้เลือกไฟล์...</span>

      <!-- พื้นที่แสดงข้อความดิบ -->
      <textarea
        id="outputText"
        placeholder="ข้อความดิบทั้งหมดจะแสดงที่นี่..."
      ></textarea>

      <!-- ปุ่มคัดลอกและดาวน์โหลด -->
      <div class="action-buttons">
        <button class="btn btn-copy" onclick="copyText()">
          📋 2. คัดลอกข้อความทั้งหมด
        </button>
        <button class="btn btn-download" onclick="downloadTxt()">
          💾 3. เซฟเป็นไฟล์ .txt
        </button>
      </div>
    </div>

    <script>
      function toRoman(num) {
        if (isNaN(num) || num <= 0) return num.toString();
        var digits = String(+num).split(""),
          key = [
            "",
            "C",
            "CC",
            "CCC",
            "CD",
            "D",
            "DC",
            "DCC",
            "DCCC",
            "CM",
            "",
            "X",
            "XX",
            "XXX",
            "XL",
            "L",
            "LX",
            "LXX",
            "LXXX",
            "XC",
            "",
            "I",
            "II",
            "III",
            "IV",
            "V",
            "VI",
            "VII",
            "VIII",
            "IX",
          ],
          roman = "",
          i = 3;
        while (i--) roman = (key[+digits.pop() + i * 10] || "") + roman;
        return Array(+digits.join("") + 1).join("M") + roman;
      }

      function formatNumber(count, format) {
        if (!format) return count;
        let f = format.toLowerCase();

        if (
          f.includes("thainumber") ||
          f.includes("thainum") ||
          f.includes("thaicounting")
        ) {
          return count
            .toString()
            .split("")
            .map((d) => ["๐", "๑", "๒", "๓", "๔", "๕", "๖", "๗", "๘", "๙"][d])
            .join("");
        }
        if (f.includes("thailetter")) {
          let thAlphabets = "กขคงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ";
          return thAlphabets[(count - 1) % 42] || count;
        }

        switch (format) {
          case "upperLetter":
            return String.fromCharCode(64 + count);
          case "lowerLetter":
            return String.fromCharCode(96 + count);
          case "lowerRoman":
            return toRoman(count).toLowerCase();
          case "upperRoman":
            return toRoman(count).toUpperCase();
          case "decimalZero":
            return count < 10 ? "0" + count : count;
          case "bullet":
            return "•";
          case "decimal":
          default:
            return count;
        }
      }

      async function parseNumbering(zip) {
        if (!zip.file("word/numbering.xml")) return null;
        let xmlString = await zip.file("word/numbering.xml").async("string");
        let parser = new DOMParser();
        let doc = parser.parseFromString(xmlString, "application/xml");

        let abstractNumMap = {};
        let abstractNums = doc.getElementsByTagName("w:abstractNum");
        for (let i = 0; i < abstractNums.length; i++) {
          let absId = abstractNums[i].getAttribute("w:abstractNumId");
          let levels = abstractNums[i].getElementsByTagName("w:lvl");
          let lvlMap = {};
          for (let j = 0; j < levels.length; j++) {
            let ilvl = levels[j].getAttribute("w:ilvl");
            let startNode = levels[j].getElementsByTagName("w:start")[0];
            let numFmtNode = levels[j].getElementsByTagName("w:numFmt")[0];
            let lvlTextNode = levels[j].getElementsByTagName("w:lvlText")[0];

            lvlMap[ilvl] = {
              start: startNode ? parseInt(startNode.getAttribute("w:val")) : 1,
              numFmt: numFmtNode ? numFmtNode.getAttribute("w:val") : "decimal",
              lvlText: lvlTextNode ? lvlTextNode.getAttribute("w:val") : "",
            };
          }
          abstractNumMap[absId] = lvlMap;
        }

        let numMap = {};
        let nums = doc.getElementsByTagName("w:num");
        for (let i = 0; i < nums.length; i++) {
          let numId = nums[i].getAttribute("w:numId");
          let absNode = nums[i].getElementsByTagName("w:abstractNumId")[0];
          if (absNode) numMap[numId] = absNode.getAttribute("w:val");
        }
        return { abstractNumMap, numMap };
      }

      async function parseStyles(zip) {
        if (!zip.file("word/styles.xml")) return {};
        let xmlString = await zip.file("word/styles.xml").async("string");
        let parser = new DOMParser();
        let doc = parser.parseFromString(xmlString, "application/xml");

        let stylesMap = {};
        let styles = doc.getElementsByTagName("w:style");
        for (let i = 0; i < styles.length; i++) {
          let styleId = styles[i].getAttribute("w:styleId");
          let numPr = styles[i].getElementsByTagName("w:numPr")[0];
          if (numPr) {
            let numIdNode = numPr.getElementsByTagName("w:numId")[0];
            let ilvlNode = numPr.getElementsByTagName("w:ilvl")[0];
            if (numIdNode) {
              stylesMap[styleId] = {
                numId: numIdNode.getAttribute("w:val"),
                ilvl: ilvlNode ? parseInt(ilvlNode.getAttribute("w:val")) : 0,
              };
            }
          }
        }
        return stylesMap;
      }

      function getListString(numId, ilvl, numberingData, listCounters) {
        if (!numberingData) return "";
        let absId = numberingData.numMap[numId];
        if (absId === undefined) return "";
        let lvlInfo = numberingData.abstractNumMap[absId]?.[ilvl];
        if (!lvlInfo) return "";

        if (!listCounters[numId]) listCounters[numId] = {};

        if (
          listCounters[numId].lastLevel !== undefined &&
          ilvl < listCounters[numId].lastLevel
        ) {
          for (let l = ilvl + 1; l < 10; l++)
            listCounters[numId][l] = undefined;
        }
        listCounters[numId].lastLevel = ilvl;

        if (listCounters[numId][ilvl] === undefined)
          listCounters[numId][ilvl] = lvlInfo.start;
        else listCounters[numId][ilvl]++;

        if (lvlInfo.numFmt === "bullet") return "• ";

        let result = lvlInfo.lvlText;
        for (let i = 0; i <= ilvl; i++) {
          let count = listCounters[numId][i];
          if (count === undefined) {
            let parentLvl = numberingData.abstractNumMap[absId]?.[i];
            count = parentLvl ? parentLvl.start : 1;
            listCounters[numId][i] = count;
          }
          let parentLvlInfo = numberingData.abstractNumMap[absId]?.[i];
          let fmt = parentLvlInfo ? parentLvlInfo.numFmt : "decimal";
          result = result.replace("%" + (i + 1), formatNumber(count, fmt));
        }
        return result + " ";
      }

      document
        .getElementById("uploadFile")
        .addEventListener("change", async function (event) {
          var file = event.target.files[0];
          if (!file) return;

          document.getElementById("fileName").textContent = file.name;
          document.getElementById("outputText").value =
            "กำลังวิเคราะห์และจัดเรียงข้อความ (พร้อมกรองข้อความซ้ำ)...";

          try {
            var arrayBuffer = await file.arrayBuffer();
            var zip = await JSZip.loadAsync(arrayBuffer);

            var numberingData = await parseNumbering(zip);
            var stylesData = await parseStyles(zip);
            var listCounters = {};

            async function extractRawFromXml(filename) {
              if (!zip.file(filename)) return "";
              var xmlString = await zip.file(filename).async("string");

              var parser = new DOMParser();
              var xmlDoc = parser.parseFromString(xmlString, "application/xml");
              var paragraphs = xmlDoc.getElementsByTagName("w:p");
              var textResult = "";

              for (var i = 0; i < paragraphs.length; i++) {
                var p = paragraphs[i];
                var pText = "";

                var numPr = p.getElementsByTagName("w:numPr")[0];
                var listNumId = null;
                var listIlvl = 0;

                if (numPr) {
                  var numIdNode = numPr.getElementsByTagName("w:numId")[0];
                  var ilvlNode = numPr.getElementsByTagName("w:ilvl")[0];
                  if (numIdNode) listNumId = numIdNode.getAttribute("w:val");
                  if (ilvlNode)
                    listIlvl = parseInt(ilvlNode.getAttribute("w:val"));
                } else {
                  var pStyle = p.getElementsByTagName("w:pStyle")[0];
                  if (pStyle && stylesData) {
                    var styleId = pStyle.getAttribute("w:val");
                    if (stylesData[styleId]) {
                      listNumId = stylesData[styleId].numId;
                      listIlvl = stylesData[styleId].ilvl;
                    }
                  }
                }

                if (listNumId && listNumId !== "0" && numberingData) {
                  pText += getListString(
                    listNumId,
                    listIlvl,
                    numberingData,
                    listCounters,
                  );
                }

                var elements = p.getElementsByTagName("*");
                for (var j = 0; j < elements.length; j++) {
                  var node = elements[j];
                  if (node.tagName === "w:t") {
                    pText += node.textContent;
                  } else if (node.tagName === "w:tab") {
                    pText += "\t";
                  } else if (
                    node.tagName === "w:br" ||
                    node.tagName === "w:cr"
                  ) {
                    pText += "\n";
                  } else if (node.tagName === "w:sym") {
                    pText += "•";
                  }
                }
                textResult += pText + "\n";
              }
              return textResult;
            }

            function sortFiles(files) {
              return files.sort((a, b) => {
                let numA = parseInt((a.match(/\d+/) || [0])[0]);
                let numB = parseInt((b.match(/\d+/) || [0])[0]);
                return numA - numB;
              });
            }

            // 1. ดึงข้อความส่วนหัว และ ป้องกันการเบิ้ลซ้ำ (Deduplication)
            var headerText = "";
            var seenHeaders = new Set(); // ใช้เก็บประวัติข้อความ Header ที่เคยเจอแล้ว
            var headerFiles = sortFiles(
              Object.keys(zip.files).filter((name) =>
                /^word\/header\d+\.xml$/.test(name),
              ),
            );
            for (var h of headerFiles) {
              let extracted = await extractRawFromXml(h);
              let trimmed = extracted.trim();
              // ถ้ามีข้อความ และ ยังไม่เคยมีข้อความนี้ใน Set จะดึงมาแสดง
              if (trimmed && !seenHeaders.has(trimmed)) {
                seenHeaders.add(trimmed);
                headerText += extracted + "\n";
              }
            }

            // 2. ดึงข้อความเนื้อหาหลัก (รวมเชิงอรรถ/อ้างอิง ถ้ามี)
            var mainText = "";
            mainText += await extractRawFromXml("word/document.xml");
            mainText += await extractRawFromXml("word/footnotes.xml");
            mainText += await extractRawFromXml("word/endnotes.xml");

            // 3. ดึงข้อความส่วนท้าย และ ป้องกันการเบิ้ลซ้ำ (Deduplication)
            var footerText = "";
            var seenFooters = new Set(); // ใช้เก็บประวัติข้อความ Footer ที่เคยเจอแล้ว
            var footerFiles = sortFiles(
              Object.keys(zip.files).filter((name) =>
                /^word\/footer\d+\.xml$/.test(name),
              ),
            );
            for (var f of footerFiles) {
              let extracted = await extractRawFromXml(f);
              let trimmed = extracted.trim();
              // ถ้ามีข้อความ และ ยังไม่เคยมีข้อความนี้ใน Set จะดึงมาแสดง
              if (trimmed && !seenFooters.has(trimmed)) {
                seenFooters.add(trimmed);
                footerText += extracted + "\n";
              }
            }

            // ประกอบร่างผลลัพธ์สุดท้าย
            var finalOutput = "";

            if (headerText.trim()) {
              finalOutput +=
                "---[ส่วนหัว] ---\n" + headerText.trim() + "\n\n\n";
            }
            if (mainText.trim()) {
              finalOutput +=
                "---[เนื้อหาหลัก] ---\n" + mainText.trim() + "\n\n\n";
            }
            if (footerText.trim()) {
              finalOutput += "---[ส่วนท้าย] ---\n" + footerText.trim() + "\n";
            }

            document.getElementById("outputText").value =
              finalOutput.trim() || "ไม่พบข้อความใดๆ ในไฟล์นี้";
          } catch (err) {
            alert("เกิดข้อผิดพลาด\nError: " + err.message);
            document.getElementById("outputText").value = "";
          }
        });

      function copyText() {
        var textarea = document.getElementById("outputText");
        if (!textarea.value.trim()) {
          alert("ไม่มีข้อความให้คัดลอก กรุณาอัปโหลดไฟล์ก่อนครับ!");
          return;
        }
        textarea.select();
        textarea.setSelectionRange(0, 9999999);
        navigator.clipboard.writeText(textarea.value).then(() => {
          alert(
            "✅ คัดลอกข้อความสำเร็จ ไม่มีข้อความ Header/Footer เบิ้ลซ้ำแล้ว!",
          );
        });
      }

      function downloadTxt() {
        var textarea = document.getElementById("outputText");
        if (!textarea.value.trim()) {
          alert("ไม่มีข้อความให้ดาวน์โหลด กรุณาอัปโหลดไฟล์ก่อนครับ!");
          return;
        }
        var blob = new Blob([textarea.value], {
          type: "text/plain;charset=utf-8",
        });
        var link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "extracted_formatted_text.txt";
        link.click();
        URL.revokeObjectURL(link.href);
      }
    </script>
  </body>
</html>
